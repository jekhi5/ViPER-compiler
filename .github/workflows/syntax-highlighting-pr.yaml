name: Validate Syntax Highlighting

on:
  pull_request:
    paths:
      - 'syntax-highlighting/**'

jobs:
  validate:
    name: Validate Syntax Highlighting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Validate JSON
        run: |
          python3 -m json.tool syntax-highlighting/viper.tmLanguage.json > /dev/null && echo "SUCCESS: viper.tmLanguage.json"
          python3 -m json.tool syntax-highlighting/VSCode/package.json > /dev/null && echo "SUCCESS: package.json"
          python3 -m json.tool syntax-highlighting/VSCode/language-configuration.json > /dev/null && echo "SUCCESS: language-configuration.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify VSIX builds
        run: |
          npm install -g @vscode/vsce
          cd syntax-highlighting/VSCode && vsce package --no-dependencies
